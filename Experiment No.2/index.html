<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Billing Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:430px;
background:#ffffff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

h2{

text-align:center;
color:#0d47a1;
margin-bottom:25px;

}

label{

display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:600;
color:#333;

}

input{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;

}

input:focus{

outline:none;
border-color:#0d47a1;

}

button{

width:100%;
margin-top:25px;
padding:12px;
background:#0d47a1;
color:white;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#1565c0;

}

#result{

margin-top:25px;
padding:18px;
background:#f8f9fa;
border-left:5px solid #0d47a1;
border-radius:6px;
display:none;

}

#result h3{

color:#0d47a1;
margin-bottom:10px;

}

#result p{

margin:8px 0;

}

.final{

font-size:20px;
font-weight:bold;
color:green;

}

.footer{

margin-top:15px;
font-size:14px;
color:#555;

}

</style>

</head>

<body>

<div class="container">

<h2>Billing Calculator</h2>

<label>Customer Name</label>
<input type="text" id="customer" placeholder="Enter Customer Name">

<label>Item Price (₹)</label>
<input type="number" id="price" placeholder="Enter Item Price">

<label>Quantity</label>
<input type="number" id="quantity" placeholder="Enter Quantity">

<button onclick="calculateBill()">
Generate Bill
</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
